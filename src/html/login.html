<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Decentralized Voting</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c14;
      --surface: #0d1220;
      --surface2: #111827;
      --border: rgba(99, 179, 237, 0.15);
      --accent: #38bdf8;
      --accent2: #818cf8;
      --success: #34d399;
      --danger: #f87171;
      --text: #e2e8f0;
      --muted: #64748b;
      --glow: 0 0 30px rgba(56, 189, 248, 0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(56,189,248,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56,189,248,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow top-right */
    body::after {
      content: '';
      position: fixed;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(129,140,248,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Second glow bottom-left */
    .bg-glow2 {
      position: fixed;
      bottom: -150px; left: -150px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(56,189,248,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ---- WRAPPER ---- */
    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---- LOGO / TITLE ---- */
    .login-brand {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .brand-icon {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: rgba(56,189,248,0.1);
      border: 1px solid rgba(56,189,248,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      box-shadow: 0 0 24px rgba(56,189,248,0.15);
    }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(56,189,248,0.08);
      border: 1px solid rgba(56,189,248,0.25);
      border-radius: 100px;
      padding: 5px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .badge-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }

    .brand-title {
      font-size: clamp(18px, 4vw, 24px);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
      background: linear-gradient(135deg, #e2e8f0 30%, var(--accent) 70%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    /* ---- CARD ---- */
    .card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 36px;
      position: relative;
      overflow: hidden;
      box-shadow: var(--glow), 0 8px 40px rgba(0,0,0,0.5);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 200px; height: 200px;
      background: radial-gradient(circle at top left, rgba(56,189,248,0.07), transparent 70%);
      pointer-events: none;
    }

    .card-heading {
      margin-bottom: 28px;
    }

    .card-heading h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .card-heading p {
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
    }

    /* ---- FORM ---- */
    #loginForm {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    input[type="text"],
    input[type="password"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      width: 100%;
    }

    input::placeholder { color: var(--muted); }

    input:focus {
      border-color: var(--accent);
      background: rgba(56,189,248,0.04);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.1);
    }

    /* ---- BUTTON ---- */
    button[type="submit"] {
      margin-top: 8px;
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, var(--accent) 0%, #0ea5e9 100%);
      color: #080c14;
      box-shadow: 0 4px 20px rgba(56,189,248,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }

    button[type="submit"]::after {
      content: '';
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      transition: opacity 0.15s;
    }

    button[type="submit"]:hover::after { opacity: 0.06; }

    button[type="submit"]:hover {
      box-shadow: 0 6px 28px rgba(56,189,248,0.45);
      transform: translateY(-1px);
    }

    button[type="submit"]:active { transform: scale(0.97); }

    /* ---- FOOTER NOTE ---- */
    .login-footer {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

  <div class="bg-glow2"></div>

  <div class="login-wrapper">

    <!-- Brand -->
    <div class="login-brand">
      <div class="brand-icon">🗳️</div>
      <div class="brand-badge">
        <span class="badge-dot"></span>
        Ethereum Mainnet
      </div>
      <h1 class="brand-title">Decentralized Voting<br>Using Ethereum Blockchain</h1>
    </div>

    <!-- Login Card -->
    <div class="card">
      <div class="card-heading">
        <h1>Welcome back</h1>
        <p>Sign in with your Voter ID to continue</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="voter-id">Voter ID</label>
          <input type="text" id="voter-id" name="voter-id" placeholder="Enter your Voter ID" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password">
        </div>
        <button type="submit">🔐 Login</button>
      </form>
    </div>

    <p class="login-footer">Secured by Ethereum · Smart Contract Authentication</p>

  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.0/umd/popper.min.js"></script>
  <script src="../js/login.js" type="module"></script>
</body>
</html>
